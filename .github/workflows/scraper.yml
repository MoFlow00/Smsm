name: Run Semagram Scraper

on:
  schedule:
    # يعمل كل 45 دقيقة
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright tqdm
          playwright install chromium
          pip list

      - name: Run Scraper
        run: python test2.py
        env:
          PYTHONUNBUFFERED: "1"

  merge-data:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Merge CSVs
        run: |
          # دمج الملفات مع إزالة التكرار (مع الحفاظ على الهيدر من أول ملف)
          awk 'FNR==1 && NR!=1{next;}{print}' data/*.csv | sort -u > data/channels_combined.csv
          
      - name: Commit and Push combined file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/channels_combined.csv
          # commit فقط إذا كانت هناك تغييرات
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-merge CSV files" && git push)
