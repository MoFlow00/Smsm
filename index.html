<!DOCTYPE html>
<html>
<head>
    <title>Telegram Channels Explorer</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <h2>Telegram Channels Data Explorer</h2>
    <p id="status">جاري تحميل البيانات...</p>
    <table id="myTable" class="display">
        <thead>
            <tr>
                <th>Username</th>
                <th>Kind</th>
                <th>Name</th>
                <th>Users</th>
                <th>Bio</th>
            </tr>
        </thead>
    </table>

    <script>
        $(document).ready(function() {
            // جلب قائمة الملفات من مجلد data في المستودع
            const repo = "MoFlow00/Smsm";
            const folder = "data";
            
            $.get(`https://api.github.com/repos/${repo}/contents/${folder}`, function(files) {
                let allData = [];
                let filesProcessed = 0;
                const csvFiles = files.filter(f => f.name.endsWith('.csv') && f.name !== 'channels_combined.csv');

                if (csvFiles.length === 0) { $("#status").text("لا توجد ملفات بيانات."); return; }

                csvFiles.forEach(file => {
                    Papa.parse(file.download_url, {
                        download: true,
                        header: true,
                        complete: function(results) {
                            allData = allData.concat(results.data);
                            filesProcessed++;
                            $("#status").text(`تم تحميل ${filesProcessed} من ${csvFiles.length} ملف...`);
                            
                            if(filesProcessed === csvFiles.length) {
                                $("#status").hide();
                                $('#myTable').DataTable({
                                    data: allData,
                                    columns: [
                                        { data: 'Username' },
                                        { data: 'Kind' },
                                        { data: 'Name' },
                                        { data: 'Users' },
                                        { data: 'Bio' }
                                    ]
                                });
                            }
                        }
                    });
                });
            }).fail(function() {
                $("#status").text("خطأ في الاتصال بـ GitHub API.");
            });
        });
    </script>
</body>
</html>
