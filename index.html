<!DOCTYPE html>
<html>
<head>
    <title>Telegram Channels Explorer</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <h2>Telegram Channels Data Explorer</h2>
    <table id="myTable" class="display">
        <thead>
            <tr>
                <th>Username</th>
                <th>Kind</th>
                <th>Name</th>
                <th>Users</th>
                <th>Bio</th>
            </tr>
        </thead>
    </table>

<script>
    $(document).ready(function() {
        // قائمة بملفاتك (يمكنك تحديثها أو جعل سكربت يولدها)
        // أو استخدام تقنية لجلب قائمة الملفات من GitHub API
        const files = ['data/channels_20260625_152249.csv', 'data/channels_...csv']; 
        
        let allData = [];
        let filesProcessed = 0;

        files.forEach(file => {
            Papa.parse(file, {
                download: true,
                header: true,
                complete: function(results) {
                    allData = allData.concat(results.data);
                    filesProcessed++;
                    if(filesProcessed === files.length) {
                        $('#myTable').DataTable({ data: allData, ... });
                    }
                }
            });
        });
    });
</script>
